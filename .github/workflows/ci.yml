name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  php:
    name: PHP Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1  # v2
        with:
          php-version: "8.4"
          tools: composer, phpstan
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache-dir
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ${{ steps.composer-cache-dir.outputs.dir }}
            install/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('install/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Validate composer.json
        run: composer validate --strict
        working-directory: install

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
        working-directory: install
        env:
          COMPOSER_VENDOR_DIR: vendor

      - name: Check for dependency vulnerabilities
        run: composer audit --no-interaction
        working-directory: install
        env:
          COMPOSER_VENDOR_DIR: vendor

      - name: PHP syntax lint
        run: |
          errors=0
          while IFS= read -r -d '' file; do
            php -l "$file" > /dev/null || errors=$((errors + 1))
          done < <(find vufind/web -name "*.php" \
            -not -path "*/tuque/*" \
            -not -path "*/PEAR/*" \
            -print0)
          if [ "$errors" -gt 0 ]; then
            echo "::error::$errors PHP syntax error(s) found"
            exit 1
          fi
          echo "All PHP files passed syntax check."

      - name: PHPStan static analysis
        run: phpstan analyse --no-progress --error-format=github

  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca  # master
        with:
          scandir: "./vufind/bash"
          severity: warning
